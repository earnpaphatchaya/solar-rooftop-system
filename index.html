<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประเมินศักยภาพโซลาร์รูฟท็อปสำหรับพื้นที่ประเทศไทย | SunJaa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- ดึงฟอนต์ Sarabun จาก Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFFDF4;
    --bg-alt: #FFF7DA;
    --panel: #FFFFFF;
    --panel-line: #E8DCC4;
    --gold: #E59F00;
    --amber: #D68F00;
    --teal: #199A8E;
    --clay: #C1502E;
    --paper: #111111;
    --text: #333333;
    --text-dim: #555555;
    --text-dimmer: #777777;
    --radius: 4px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    /* เปลี่ยนฟอนต์หลักเป็น Sarabun */
    font-family:'Sarabun', sans-serif;
    font-weight:400;
    line-height:1.75;
  }
  h1,h2,h3,h4{
    font-family:'Chakra Petch','Sarabun',sans-serif;
    font-weight:600;
    margin:0;
    letter-spacing:0.01em;
    color:var(--paper);
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  a{ color:inherit; }
  img{max-width:100%; display:block;}
  .wrap{ max-width:1180px; margin:0 auto; padding:0 32px; }
  
  /* เพิ่มเติมส่วนอื่นๆ คงเดิมตามที่คุณชอบครับ */
  header.site-nav{ position:sticky; top:0; z-index:50; background:rgba(255, 253, 244, 0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--panel-line); }
  .nav-inner{ display:flex; align-items:center; justify-content:space-between; padding:14px 32px; max-width:1180px; margin:0 auto; }
  .brand{ display:flex; align-items:center; gap:10px; font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:18px; text-decoration:none; color:var(--paper); }
  nav.links{ display:flex; gap:28px; font-size:14px; font-weight:500;}
  nav.links a{ text-decoration:none; color:var(--text); padding:4px 0; border-bottom:2px solid transparent; }
  nav.links a:hover{ color:var(--gold); border-color:var(--gold); }
  
  .hero{ position:relative; overflow:hidden; padding:96px 0 84px; border-bottom:1px solid var(--panel-line); background:var(--bg); }
  .hero-grid{ display:grid; grid-template-columns:1.15fr 0.85fr; gap:56px; align-items:center; }
  .eyebrow{ display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--teal); border:1px solid rgba(25, 154, 142, 0.35); background:rgba(25, 154, 142, 0.08); padding:4px 10px; border-radius:var(--radius); margin-bottom:20px; }
  .btn{ padding:12px 22px; border-radius:var(--radius); font-weight:600; text-decoration:none; }
  .btn-primary{ background:var(--gold); color:#FFF; }
  
  .scan-box{ position:relative; aspect-ratio:1/1; border:1px solid var(--panel-line); background:var(--panel); border-radius:4px; overflow:hidden; }
  
  /* ส่วนที่เหลือใช้โครงสร้างเดิมของคุณได้เลยครับ */
</style>
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a href="#top" class="brand">SUNJAA · PROJECTS</a>
    <nav class="links">
      <a href="#intro">บทนำ</a>
      <a href="#objective">วัตถุประสงค์</a>
      <a href="#design">การออกแบบระบบ</a>
      <a href="#results">ผลการทดลอง</a>
    </nav>
  </div>
</header>

<main id="top">
  <section class="hero">
    <div class="wrap hero-grid">
      <div>
        <div class="eyebrow">Thammasat School of Engineering</div>
        <h1>ระบบประเมินโซลาร์รูฟท็อปสำหรับพื้นที่ประเทศไทย</h1>
        <p>ส่งพิกัดผ่าน LINE เพื่อให้ AI วิเคราะห์ศักยภาพหลังคาและระยะเวลาคืนทุน</p>
        <div style="margin-top:20px;">
          <a href="#results" class="btn btn-primary">ดูผลการทดลอง</a>
        </div>
      </div>
      <div class="scan-box">
         <img src="map.jpg" alt="Satellite Map" style="position:absolute; width:100%; height:100%; object-fit:cover; opacity:0.7;">
      </div>
    </div>
  </section>
</main>

</body>
</html>
